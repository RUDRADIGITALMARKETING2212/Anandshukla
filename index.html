<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>FELICITY RUDRAxGARG — Digital Marketing</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Poppins:wght@400;600&family=Great+Vibes&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg1: #f5f5f5;
      --glass: rgba(255,255,255,0.6);
      --accentA: #ff6ec7;
      --accentB: #6b5bff;
      --accentC: #00aaff;
      --glass-border: rgba(0,0,0,0.08);
      --text-dark: #111;
      --text-light: #333;
      --particle-color: rgba(50,50,50,0.2);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; width: 100%; }

    body {
      font-family: 'Poppins', sans-serif;
      background: radial-gradient(ellipse at 10% 10%, rgba(107,91,255,0.04), transparent 6%),
                  radial-gradient(ellipse at 90% 90%, rgba(255,110,199,0.03), transparent 8%),
                  var(--bg1);
      color: var(--text-dark);
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    #bg-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    .page {
      position: relative;
      z-index: 5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .hero {
      width: 100%;
      max-width: 1100px;
      border-radius: 18px;
      padding: 32px;
      background: linear-gradient(180deg, rgba(255,255,255,0.6), rgba(255,255,255,0.5));
      backdrop-filter: blur(8px) saturate(120%);
      border: 1px solid var(--glass-border);
      box-shadow: 0 20px 60px rgba(0,0,0,0.1);
      display: grid;
      grid-template-columns: 420px 1fr;
      gap: 28px;
      align-items: center;
      position: relative;
      overflow: visible;
    }

    .ring {
      width: 340px;
      height: 340px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: auto;
      position: relative;
    }

    .ring::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 50%;
      padding: 12px;
      background: conic-gradient(from 120deg, var(--accentA), var(--accentB), var(--accentC), var(--accentA));
      -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 24px), black calc(100% - 24px));
      mask: radial-gradient(farthest-side, transparent calc(100% - 24px), black calc(100% - 24px));
      filter: blur(10px) saturate(120%);
      animation: spin 9s linear infinite;
      transform-origin: center;
      z-index: 1;
    }

    .ring::after {
      content: "";
      position: absolute;
      inset: 6%;
      border-radius: 50%;
      box-shadow: 0 0 40px rgba(107,91,255,0.1), inset 0 0 30px rgba(0,170,255,0.06);
      z-index: 2;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .logo-inner {
      position: relative;
      width: 240px;
      height: 240px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(180deg, rgba(255,255,255,0.55), rgba(255,255,255,0.2));
      box-shadow: 0 12px 40px rgba(0,0,0,0.1);
      z-index: 3;
      transition: transform 0.45s ease;
    }

    .logo-inner img {
      width: 84%;
      height: 84%;
      object-fit: contain;
      border-radius: 50%;
      display: block;
    }

    .logo-inner:hover {
      transform: translateY(-8px) rotate(-2deg);
    }

    .content {
      display: flex;
      flex-direction: column;
      gap: 16px;
      align-items: flex-start;
    }

    .badge {
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      color: var(--text-dark);
      background: linear-gradient(90deg, var(--accentB), var(--accentA));
      -webkit-background-clip: text;
      font-size: 14px;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid rgba(0,0,0,0.08);
      backdrop-filter: blur(4px);
    }

    .title {
      font-family: 'Orbitron', sans-serif;
      font-size: 38px;
      letter-spacing: 2px;
      margin: 6px 0 0 0;
      color: var(--text-dark);
    }

    .sub {
      font-size: 16px;
      color: var(--text-light);
      margin-top: 6px;
      max-width: 680px;
      line-height: 1.5;
    }

    .typing {
      margin-top: 12px;
      font-weight: 600;
      color: var(--accentC);
      font-size: 18px;
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .typing .cursor {
      width: 2px;
      height: 22px;
      background: var(--text-dark);
      animation: blink 1s steps(2) infinite;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    .cta-wrap { margin-top: 18px; display: flex; flex-direction: column; gap: 8px; align-items: flex-start; }
    .cta-btn {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 14px 28px;
      border-radius: 999px;
      font-weight: 800;
      font-size: 18px;
      color: #fff;
      text-decoration: none;
      background: linear-gradient(90deg, var(--accentB), var(--accentA));
      box-shadow: 0 12px 40px rgba(107,91,255,0.2);
      border: none;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .cta-btn:hover {
      transform: translateY(-6px) scale(1.02);
      box-shadow: 0 30px 80px rgba(107,91,255,0.28);
    }

    .chips { display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap; }
    .chip {
      padding: 8px 12px;
      border-radius: 999px;
      font-weight: 700;
      font-size: 13px;
      background: rgba(0,0,0,0.03);
      border: 1px solid rgba(0,0,0,0.05);
      cursor: pointer;
      transition: transform 0.18s ease;
    }
    .chip:hover { transform: translateY(-6px); }

    @media (max-width: 980px) {
      .hero { grid-template-columns: 1fr; text-align: center; padding: 24px; }
      .content { align-items: center; }
      .ring { width: 260px; height: 260px; margin: 0 auto; }
      .logo-inner { width: 200px; height: 200px; }
      .title { font-size: 28px; }
      .sub { font-size: 14px; }
      .cta-wrap { align-items: center; }
      .cta-btn { width: 100%; justify-content: center; font-size: 16px; padding: 12px 20px; }
    }

    @media (max-width: 560px) {
      .ring { width: 220px; height: 220px; }
      .logo-inner { width: 160px; height: 160px; }
      .title { font-size: 22px; }
      .sub { font-size: 13px; padding: 0 10px; }
      .chips { justify-content: center; }
      .chip { font-size: 12px; padding: 6px 10px; }
    }
  </style>
</head>
<body>

  <canvas id="bg-canvas"></canvas>

  <div class="page">
    <div class="hero">
      <div class="ring" aria-hidden="true">
        <div class="logo-inner" title="UNIQUE RUDRAXGARG">
          <img src="logo.png" alt="URxG Logo">
        </div>
      </div>

      <div class="content">
        <div class="badge">꧁༺ 𝓕𝓔𝓛𝓘𝓒𝓘𝓣𝓨 𝓡𝓤𝓓𝓡𝓐✘𝓖𝓐𝓡𝓖 ༻꧂</div>
        <h1 class="title">FELICITY RUDRA<span style="color:var(--accentC)">✘</span>GARG</h1>
        <p class="sub">We craft bold digital brands, scalable marketing systems, and memorable campaigns that grow businesses.</p>

        <div class="typing">
          <div id="typed-text">Digital Marketing • Branding • FRGD</div>
          <div class="cursor"></div>
        </div>

        <div class="cta-wrap">
          <a class="cta-btn" href="first.html" target="_blank">
            🛠️ GO TO WEB — Visit Site
          </a>
        </div>

        <div class="chips">
          <div class="chip" onclick="copyName('꧁༺ 𝓕𝓔𝓛𝓘𝓒𝓘𝓣𝓨 𝓡𝓤𝓓𝓡𝓐✘𝓖𝓐𝓡𝓖 ༻꧂')">Ornamental</div>
          <div class="chip" onclick="copyName('⧫ 𝔽𝔼𝕃𝕀ℂ𝕀𝕋𝕐 ℝ𝕌𝔻ℝ𝔸✘𝔾𝔸ℝ𝔾 ⧫')">Neon</div>
          <div class="chip" onclick="copyName('【ＦＥＬＩＣＩＴＹ　ＲＵＤＲＡ✘ＧＡＲＧ】')">Fullwidth</div>
          <div class="chip" onclick="copyName('✦ 𝑭𝑬𝑳𝑰𝑪𝑰𝑻𝒀 𝑹𝑼𝑫𝑹𝑨✘𝑮𝑨𝑹𝑮 ✦')">Serif</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    (function(){
      const phrases = [
        'Digital Marketing • Branding • Innovation',
        'Growth Campaigns • Social Media • Performance',
        'ANAND SHUKLA • FOUNDER/DIRECTOR',
        'ANAND SINGH • TEAM HEAD',
        'ANUPAM PANDEY • CO-FOUNDER'
      ];
      const el = document.getElementById('typed-text');
      let p = 0, i = 0, forward = true;

      function tick(){
        const text = phrases[p];
        if(forward){
          i++;
          if(i >= text.length){ forward = false; setTimeout(tick, 1000); return; }
        } else {
          i--;
          if(i <= 0){ forward = true; p = (p+1) % phrases.length; setTimeout(tick, 300); return; }
        }
        el.textContent = text.slice(0,i);
        setTimeout(tick, 50);
      }
      tick();
    })();

    function copyName(text){
      navigator.clipboard?.writeText(text).then(()=>{
        alert('Copied: ' + text);
      }).catch(()=>{
        prompt('Copy this name:', text);
      });
    }

    (function(){
      const canvas = document.getElementById('bg-canvas');
      const ctx = canvas.getContext('2d');
      let w = canvas.width = innerWidth;
      let h = canvas.height = innerHeight;
      const particles = [];
      const count = Math.floor(Math.min(120, (w*h)/50000));
      for(let i=0;i<count;i++){
        particles.push({
          x: Math.random()*w,
          y: Math.random()*h,
          r: 0.6 + Math.random()*1.8,
          vx: (Math.random()-0.5)*0.3,
          vy: (Math.random()-0.5)*0.3,
          alpha: 0.1 + Math.random()*0.4
        });
      }
      function resize(){ w = canvas.width = innerWidth; h = canvas.height = innerHeight; }
      addEventListener('resize', resize, {passive:true});

      function draw(){
        ctx.clearRect(0,0,w,h);
        const g = ctx.createRadialGradient(w*0.2,h*0.2,0,w/2,h/2,Math.max(w,h));
        g.addColorStop(0,'rgba(255,255,255,0)');
        g.addColorStop(1,'rgba(200,200,200,0.3)');
        ctx.fillStyle = g;
        ctx.fillRect(0,0,w,h);

        for(const p of particles){
          p.x += p.vx;
          p.y += p.vy;
          if(p.x < -10) p.x = w+10;
          if(p.x > w+10) p.x = -10;
          if(p.y < -10) p.y = h+10;
          if(p.y > h+10) p.y = -10;
          ctx.beginPath();
          ctx.fillStyle = 'rgba(100,100,100,'+p.alpha+')';
          ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
          ctx.fill();
        }

        requestAnimationFrame(draw);
      }
      draw();
    })();
  </script>
</body>
</html>
